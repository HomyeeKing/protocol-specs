<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protocol Specs Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --dark: #0f172a;
      --gray: #64748b;
      --light: #f8fafc;
      --border: #e2e8f0;
      --sidebar-width: 280px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: var(--dark);
      background: white;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1 0%, #0ea5e9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .protocol-select {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: white;
      cursor: pointer;
      min-width: 200px;
    }

    .protocol-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .github-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--light);
      border-radius: 8px;
      text-decoration: none;
      color: var(--dark);
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }

    .github-link:hover {
      background: #e2e8f0;
    }

    /* Layout */
    .layout {
      display: flex;
      margin-top: 60px;
      min-height: calc(100vh - 60px);
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: 0;
      top: 60px;
      width: var(--sidebar-width);
      height: calc(100vh - 60px);
      overflow-y: auto;
      padding: 24px;
      border-right: 1px solid var(--border);
      background: var(--light);
    }

    .toc-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .toc {
      list-style: none;
    }

    .toc li {
      margin-bottom: 8px;
    }

    .toc a {
      display: block;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--dark);
      font-size: 14px;
      transition: background 0.2s;
    }

    .toc a:hover {
      background: #e2e8f0;
    }

    .toc a.active {
      background: var(--primary);
      color: white;
    }

    .toc ul {
      list-style: none;
      padding-left: 16px;
      margin-top: 4px;
    }

    .toc ul li a {
      font-size: 13px;
      color: var(--gray);
    }

    /* Main Content */
    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 40px 60px;
      max-width: 100%;
    }

    .content {
      max-width: 900px;
    }

    /* Markdown Styles */
    .markdown {
      font-size: 16px;
      line-height: 1.8;
    }

    .markdown h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .markdown h2 {
      font-size: 28px;
      font-weight: 700;
      margin: 48px 0 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .markdown h3 {
      font-size: 22px;
      font-weight: 600;
      margin: 32px 0 16px;
    }

    .markdown h4 {
      font-size: 18px;
      font-weight: 600;
      margin: 24px 0 12px;
    }

    .markdown p {
      margin-bottom: 16px;
      color: #334155;
    }

    .markdown code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      background: var(--light);
      padding: 2px 6px;
      border-radius: 4px;
      color: #e11d48;
    }

    .markdown pre {
      margin: 24px 0;
      border-radius: 12px;
      overflow: hidden;
    }

    .markdown pre code {
      display: block;
      padding: 20px;
      overflow-x: auto;
      background: #0d1117;
      color: #c9d1d9;
      line-height: 1.6;
    }

    .markdown ul, .markdown ol {
      margin: 16px 0;
      padding-left: 24px;
    }

    .markdown li {
      margin-bottom: 8px;
    }

    .markdown blockquote {
      margin: 24px 0;
      padding: 16px 20px;
      background: var(--light);
      border-left: 4px solid var(--primary);
      border-radius: 0 8px 8px 0;
      color: var(--gray);
    }

    .markdown table {
      width: 100%;
      margin: 24px 0;
      border-collapse: collapse;
    }

    .markdown th, .markdown td {
      padding: 12px 16px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .markdown th {
      background: var(--light);
      font-weight: 600;
    }

    .markdown tr:nth-child(even) {
      background: var(--light);
    }

    .markdown a {
      color: var(--primary);
      text-decoration: none;
    }

    .markdown a:hover {
      text-decoration: underline;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: var(--gray);
    }

    .loading::after {
      content: '';
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .sidebar {
        display: none;
      }

      .main {
        margin-left: 0;
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="index.html" class="logo">Protocol Specs</a>
      <select class="protocol-select" id="protocolSelect">
        <option value="mcp">MCP - Model Context Protocol</option>
        <option value="lsp">LSP - Language Server Protocol</option>
        <option value="acp">ACP - Agent Communication Protocol</option>
      </select>
    </div>
    <div class="header-right">
      <a href="https://github.com/HomyeeKing/protocol-specs" class="github-link" target="_blank">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        GitHub
      </a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="toc-title">Table of Contents</div>
      <nav class="toc" id="toc"></nav>
    </aside>

    <main class="main">
      <div class="content" id="content">
        <div class="loading">Loading</div>
      </div>
    </main>
  </div>

  <script>
    // Configure marked
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: false,
      gfm: true
    });

    // Load markdown content
    async function loadProtocol(protocol) {
      const contentEl = document.getElementById('content');
      const tocEl = document.getElementById('toc');
      
      contentEl.innerHTML = '<div class="loading">Loading</div>';
      
      try {
        const response = await fetch(`${protocol}/README.md`);
        const markdown = await response.text();
        
        // Render markdown
        const html = marked.parse(markdown);
        contentEl.innerHTML = `<div class="markdown">${html}</div>`;
        
        // Generate TOC
        generateTOC(markdown, tocEl);
        
        // Update URL
        history.pushState({ protocol }, '', `?spec=${protocol}`);
        
      } catch (error) {
        contentEl.innerHTML = `<div class="markdown"><p style="color: red;">Error loading spec: ${error.message}</p></div>`;
      }
    }

    // Generate table of contents
    function generateTOC(markdown, container) {
      const lines = markdown.split('\n');
      const headings = [];
      
      lines.forEach(line => {
        const match = line.match(/^(#{1,6})\s+(.+)$/);
        if (match) {
          headings.push({
            level: match[1].length,
            text: match[2],
            slug: match[2].toLowerCase().replace(/[^a-z0-9]+/g, '-')
          });
        }
      });
      
      let html = '<ul class="toc">';
      let lastLevel = 1;
      
      headings.forEach((heading, index) => {
        if (heading.level > lastLevel) {
          html += '<ul>';
        } else if (heading.level < lastLevel) {
          html += '</ul>'.repeat(lastLevel - heading.level);
        }
        
        html += `<li><a href="#${heading.slug}" data-level="${heading.level}">${heading.text}</a></li>`;
        lastLevel = heading.level;
      });
      
      html += '</ul>'.repeat(lastLevel);
      container.innerHTML = html;
      
      // Add click handlers
      container.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const target = document.getElementById(link.getAttribute('href').substring(1));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    }

    // Initialize
    document.getElementById('protocolSelect').addEventListener('change', (e) => {
      loadProtocol(e.target.value);
    });

    // Check URL params
    const params = new URLSearchParams(window.location.search);
    const spec = params.get('spec') || 'mcp';
    document.getElementById('protocolSelect').value = spec;
    loadProtocol(spec);
  </script>
</body>
</html>
